```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Page | Kataria Dairy</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #020024, #090979, #00d4ff);
            background-size: 300% 300%;
            animation: gradientMove 12s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 15px;
            position: relative;
            overflow: hidden;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body::before,
        body::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: .35;
            z-index: 0;
            animation: float 8s ease-in-out infinite;
        }

        body::before {
            width: 280px;
            height: 280px;
            background: #00d4ff;
            top: -80px;
            left: -80px;
        }

        body::after {
            width: 320px;
            height: 320px;
            background: #3a7bd5;
            bottom: -100px;
            right: -100px;
            animation-delay: 2s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-25px) translateX(15px); }
        }

        .order-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, .95);
            backdrop-filter: blur(15px);
            border-radius: 22px;
            padding: 40px 32px;
            box-shadow: 0 20px 50px rgba(0, 10, 40, .35);
            animation: fadeInUp .7s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .order-icon {
            width: 75px;
            height: 75px;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #3a7bd5);
            box-shadow: 0 8px 20px rgba(0, 180, 255, .4);
        }

        h1.title {
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            color: #090979;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: #6c757d;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .form-control,
        .form-select {
            height: 50px;
            border-radius: 12px;
            border: 1.5px solid #cfe4ff;
            margin-bottom: 18px;
            padding: 10px 14px;
            background: #f8fbff;
            transition: all .25s ease;
        }

        textarea.form-control {
            height: auto;
            min-height: 90px;
            resize: vertical;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, .2);
            background: white;
        }

        .btn-submit {
            width: 100%;
            height: 50px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            background: linear-gradient(135deg, #00d4ff, #3a7bd5);
            color: white;
            transition: all .25s ease;
            box-shadow: 0 10px 25px rgba(0, 180, 255, .35);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 32px rgba(0, 180, 255, .5);
            background: linear-gradient(135deg, #33ddff, #3a7bd5);
            color: white;
        }

    </style>
</head>
<body>

<div class="order-card">

    <div class="order-icon">🥛</div>

    <h1 class="title">Place Your Order</h1>
    <p class="subtitle">Fresh milk, delivered to your doorstep</p>

    <form action="/submit" method="POST">

        <input
            type="text"
            name="name"
            class="form-control"
            placeholder="Your Name"
            required>

        <input
            type="tel"
            name="mobile"
            class="form-control"
            placeholder="Mobile Number"
            required>

        <textarea
            name="address"
            class="form-control"
            placeholder="Full Address"
            required></textarea>

        <select name="quantity" class="form-select">
            <option>500 ml</option>
            <option>1 Litre</option>
            <option>2 Litre</option>
        </select>

        <input
            type="time"
            name="time"
            class="form-control">

        <button type="submit" class="btn-submit">
            Submit Order
        </button>

    </form>

</div>

</body>
</html>
```
