<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed — Kataria Dairy</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">

    <style>
        :root{
            --cream:#FBF6EC;
            --cream-deep:#F3ECDB;
            --midnight:#0A1758;
            --midnight-2:#141E6B;
            --sky:#00B4D8;
            --amber:#F5A300;
            --amber-deep:#D98600;
            --green:#2FB86A;
            --ink:#1B1B2F;
            --ink-soft:#5B5B72;

            --font-display: 'Fraunces', serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        *{ box-sizing:border-box; margin:0; padding:0; }

        html,body{
            height:100%;
        }

        body{
            font-family:var(--font-body);
            color:var(--ink);
            background:
                radial-gradient(900px 480px at 15% -10%, rgba(0,180,216,0.18), transparent 60%),
                radial-gradient(700px 420px at 90% 110%, rgba(245,163,0,0.14), transparent 60%),
                var(--cream);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:2rem 1.25rem;
            overflow-x:hidden;
        }

        @media (prefers-reduced-motion: reduce){
            *{ animation:none !important; }
        }

        .card{
            position:relative;
            width:100%;
            max-width:480px;
            background:#fff;
            border-radius:24px;
            padding:3rem 2.4rem 2.6rem;
            text-align:center;
            box-shadow:0 30px 70px rgba(10,23,88,0.14), 0 4px 14px rgba(10,23,88,0.06);
            border:1px solid rgba(10,23,88,0.06);
            overflow:hidden;
        }

        /* subtle ripple rings behind the card content */
        .bg-ripple{
            position:absolute;
            left:50%; top:36%;
            transform:translate(-50%,-50%);
            border-radius:50%;
            border:1.5px solid rgba(0,180,216,0.25);
            pointer-events:none;
        }
        .bg-ripple.br1{ width:40px; height:40px; animation:bgripple 2.6s ease-out infinite; }
        .bg-ripple.br2{ width:40px; height:40px; animation:bgripple 2.6s ease-out infinite .5s; }
        .bg-ripple.br3{ width:40px; height:40px; animation:bgripple 2.6s ease-out infinite 1s; }
        @keyframes bgripple{
            0%{ width:40px; height:40px; opacity:.55; }
            100%{ width:340px; height:340px; opacity:0; }
        }

        /* Check circle */
        .check-wrap{
            position:relative;
            width:96px;
            height:96px;
            margin:0 auto 1.6rem;
        }
        .check-circle{
            width:96px;
            height:96px;
            border-radius:50%;
            background:linear-gradient(135deg,#3FD37F,var(--green));
            display:flex;
            align-items:center;
            justify-content:center;
            box-shadow:0 14px 28px rgba(47,184,106,0.35);
            transform:scale(0);
            animation:popIn .55s cubic-bezier(.25,1.4,.4,1) .15s forwards;
        }
        @keyframes popIn{
            to{ transform:scale(1); }
        }
        .check-circle svg{
            width:46px; height:46px;
        }
        .check-circle path{
            fill:none;
            stroke:#fff;
            stroke-width:4.5;
            stroke-linecap:round;
            stroke-linejoin:round;
            stroke-dasharray:40;
            stroke-dashoffset:40;
            animation:drawCheck .5s ease-out .55s forwards;
        }
        @keyframes drawCheck{ to{ stroke-dashoffset:0; } }

        /* fade-up text sequence */
        .rise{
            opacity:0;
            transform:translateY(16px);
            animation:riseUp .6s cubic-bezier(.2,.7,.3,1) forwards;
        }
        @keyframes riseUp{ to{ opacity:1; transform:translateY(0); } }

        .eyebrow{
            font-family:var(--font-mono);
            font-size:.72rem;
            letter-spacing:.18em;
            text-transform:uppercase;
            color:var(--amber-deep);
            font-weight:600;
        }

        h1{
            font-family:var(--font-display);
            font-weight:600;
            font-size:1.9rem;
            color:var(--midnight);
            margin:.5rem 0 .3rem;
            letter-spacing:-0.01em;
        }

        .sub{
            font-size:.98rem;
            color:var(--ink-soft);
            margin-bottom:.35rem;
        }

        .divider{
            width:44px;
            height:2px;
            background:var(--sky);
            border-radius:2px;
            margin:1.4rem auto;
            opacity:0;
            animation:riseUp .5s ease .55s forwards;
        }

        .note{
            font-size:.88rem;
            color:var(--ink-soft);
            line-height:1.6;
            margin-bottom:2rem;
        }

        .note strong{ color:var(--ink); }

        .btn-milk{
            position:relative;
            display:inline-flex;
            align-items:center;
            justify-content:center;
            gap:.5rem;
            font-family:var(--font-body);
            font-weight:700;
            font-size:.98rem;
            padding:.85rem 2.2rem;
            border-radius:999px;
            border:none;
            color:#fff;
            background:linear-gradient(135deg,var(--amber),var(--amber-deep));
            box-shadow:0 10px 24px rgba(217,134,0,0.35), inset 0 0 0 1px rgba(255,255,255,0.15);
            overflow:hidden;
            isolation:isolate;
            text-decoration:none;
            transition:transform .35s cubic-bezier(.2,.8,.2,1), box-shadow .35s ease;
        }
        .btn-milk::before{
            content:"";
            position:absolute;
            inset:0;
            z-index:-1;
            background:linear-gradient(120deg, transparent 30%, rgba(255,255,255,.9) 50%, transparent 70%);
            transform:translateX(-120%);
            transition:transform .7s ease;
        }
        .btn-milk:hover{
            transform:translateY(-3px);
            box-shadow:0 16px 32px rgba(217,134,0,0.45);
        }
        .btn-milk:hover::before{ transform:translateX(120%); }
        .btn-milk:active{ transform:translateY(-1px) scale(.98); }

        /* floating milk drops celebration */
        .drops{
            position:absolute;
            inset:0;
            pointer-events:none;
            overflow:hidden;
            border-radius:24px;
        }
        .drops span{
            position:absolute;
            top:-20px;
            width:10px;
            height:14px;
            background:linear-gradient(160deg,#ffffff,#cfeffd);
            border-radius:50% 50% 50% 0;
            opacity:.85;
            animation:fallDrop linear forwards;
        }
        @keyframes fallDrop{
            to{ transform:translateY(420px) rotate(180deg); opacity:0; }
        }

        .brand{
            margin-top:2.2rem;
            font-family:var(--font-mono);
            font-size:.72rem;
            letter-spacing:.1em;
            text-transform:uppercase;
            color:var(--ink-soft);
            opacity:0;
            animation:riseUp .5s ease .7s forwards;
        }
        .brand span{ color:var(--midnight); font-weight:600; }
    </style>
</head>

<body>

<div class="card">
    <div class="bg-ripple br1"></div>
    <div class="bg-ripple br2"></div>
    <div class="bg-ripple br3"></div>

    <div class="drops" id="dropsField"></div>

    <div class="check-wrap">
        <div class="check-circle">
            <svg viewBox="0 0 24 24">
                <path d="M4 12.5L9.5 18L20 6.5"></path>
            </svg>
        </div>
    </div>

    <span class="eyebrow rise" style="animation-delay:.35s">Order Placed</span>
    <h1 class="rise" style="animation-delay:.4s">Order Confirmed!</h1>
    <p class="sub rise" style="animation-delay:.45s">Thank you for choosing Kataria Dairy.</p>

    <div class="divider"></div>

    <p class="note rise" style="animation-delay:.5s">
        Your order has been received successfully. <strong>Fresh milk is on its way</strong> —
        our team will have it at your doorstep on the next delivery round.
    </p>

    <a href="/" class="btn-milk rise" style="animation-delay:.6s">← Go Back Home</a>

    <div class="brand">🥛 <span>Kataria Dairy</span></div>
</div>

<script>
    // Celebration: a few milk drops fall inside the card once
    const field = document.getElementById('dropsField');
    const positions = [12, 28, 45, 58, 72, 85];
    positions.forEach((left, i) => {
        const d = document.createElement('span');
        d.style.left = left + '%';
        d.style.animationDuration = (1.6 + Math.random() * 0.8) + 's';
        d.style.animationDelay = (0.6 + i * 0.08) + 's';
        field.appendChild(d);
    });
</script>

</body>
</html>
