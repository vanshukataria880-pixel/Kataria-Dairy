<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kataria Dairy | Admin Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

* {
box-sizing:border-box;
}

body{
height:100vh;
margin:0;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#020024,#090979,#00d4ff);
background-size:300% 300%;
animation:gradientMove 12s ease infinite;
font-family:Arial,Helvetica,sans-serif;
position:relative;
overflow:hidden;
}

@keyframes gradientMove{
0%{ background-position:0% 50%; }
50%{ background-position:100% 50%; }
100%{ background-position:0% 50%; }
}

/* animated glow blobs in background */
body::before,
body::after{
content:"";
position:absolute;
border-radius:50%;
filter:blur(90px);
opacity:.4;
z-index:0;
animation:float 8s ease-in-out infinite;
}

body::before{
width:320px;
height:320px;
background:#00d4ff;
top:-90px;
left:-90px;
}

body::after{
width:380px;
height:380px;
background:#3a7bd5;
bottom:-110px;
right:-110px;
animation-delay:2s;
}

@keyframes float{
0%,100%{ transform:translateY(0) translateX(0); }
50%{ transform:translateY(-25px) translateX(15px); }
}

/* subtle floating particles */
.particle{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,.5);
z-index:0;
animation:rise linear infinite;
}

@keyframes rise{
from{ transform:translateY(0); opacity:.7; }
to{ transform:translateY(-100vh); opacity:0; }
}

.login-card{

width:400px;

background:rgba(255,255,255,.10);

backdrop-filter:blur(20px);

padding:40px;

border-radius:25px;

box-shadow:0 20px 50px rgba(0,10,40,.45);

border:1px solid rgba(255,255,255,.2);

color:white;

position:relative;

z-index:1;

animation:fadeInUp .7s ease;

}

@keyframes fadeInUp{
from{ opacity:0; transform:translateY(25px); }
to{ opacity:1; transform:translateY(0); }
}

.logo{

width:90px;

height:90px;

margin:0 auto 10px;

display:flex;

align-items:center;

justify-content:center;

font-size:46px;

border-radius:50%;

background:linear-gradient(135deg,#00d4ff,#3a7bd5);

box-shadow:0 8px 20px rgba(0,180,255,.45);

animation:bounce 2.5s ease-in-out infinite;

}

@keyframes bounce{
0%,100%{ transform:translateY(0); }
50%{ transform:translateY(-8px); }
}

h2{

text-align:center;

margin-top:5px;

margin-bottom:8px;

font-weight:bold;

letter-spacing:.5px;

}

p{

text-align:center;

opacity:.8;

margin-bottom:30px;

}

.input-group-custom{

position:relative;

margin-bottom:20px;

}

.input-icon{

position:absolute;

left:16px;

top:50%;

transform:translateY(-50%);

opacity:.8;

pointer-events:none;

}

.form-control{

height:50px;

border-radius:12px;

margin-bottom:0;

padding-left:42px;

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.25);

color:#fff;

transition:all .25s ease;

}

.form-control::placeholder{

color:rgba(255,255,255,.65);

}

.form-control:focus{

background:rgba(255,255,255,.16);

border-color:#00d4ff;

box-shadow:0 0 0 3px rgba(0,212,255,.3);

color:#fff;

}

.btn-login{

width:100%;

height:50px;

border-radius:12px;

font-size:18px;

font-weight:bold;

border:none;

background:linear-gradient(135deg,#00d4ff,#3a7bd5);

color:#fff;

transition:transform .2s ease, box-shadow .2s ease;

margin-top:5px;

}

.btn-login:hover{

transform:translateY(-2px);

box-shadow:0 10px 28px rgba(0,180,255,.5);

background:linear-gradient(135deg,#33ddff,#3a7bd5);

color:#fff;

}

.btn-login:active{

transform:translateY(0);

}

.footer{

margin-top:20px;

text-align:center;

font-size:14px;

opacity:.8;

}

</style>

</head>

<body>

<div class="particle" style="width:6px;height:6px;left:10%;animation-duration:9s;"></div>
<div class="particle" style="width:4px;height:4px;left:25%;animation-duration:7s;animation-delay:1s;"></div>
<div class="particle" style="width:8px;height:8px;left:45%;animation-duration:11s;animation-delay:2s;"></div>
<div class="particle" style="width:5px;height:5px;left:65%;animation-duration:8s;animation-delay:0.5s;"></div>
<div class="particle" style="width:7px;height:7px;left:80%;animation-duration:10s;animation-delay:3s;"></div>
<div class="particle" style="width:4px;height:4px;left:90%;animation-duration:6s;animation-delay:1.5s;"></div>

<div class="login-card">

<div class="logo">
🥛
</div>

<h2>Kataria Dairy</h2>

<p>Secure Admin Login</p>

<form action="/login" method="POST">

<div class="input-group-custom">
<span class="input-icon">👤</span>
<input
type="text"
name="username"
class="form-control"
placeholder="Username"
required>
</div>

<div class="input-group-custom">
<span class="input-icon">🔒</span>
<input
type="password"
name="password"
class="form-control"
placeholder="Password"
required>
</div>

<button class="btn btn-login">
Login
</button>

</form>

<div class="footer">

© 2026 Kataria Dairy

</div>

</div>

</body>
</html>
